    <script>
        // Fix for Safari/iOS: 100vh includes browser chrome. Use window.innerHeight as fallback.
        // We only override the CSS custom property if modern dvh units are not supported.
        function setAppHeight() {
            if (!(window.CSS && CSS.supports && CSS.supports('height', '100dvh'))) {
                document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
            }
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', function() { setTimeout(setAppHeight, 300); });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');

        :root {
            --app-height: 100vh;
        }

        @supports (height: 100dvh) {
            :root {
                --app-height: 100dvh;
            }
        }

        html, body, #root {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #010605;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            color-scheme: dark;
            overflow: hidden;
            width: 100%;
            /* Use dynamic height so Safari toolbar adapts smoothly */
            height: var(--app-height);
            max-height: var(--app-height);
            max-width: 100%;
            position: relative;
            touch-action: pan-y;
            overscroll-behavior: none;
        }

        /* Scroll padding = navbar height + safe area bottom inset */

        .pb-nav {
            padding-bottom: calc(64px + env(safe-area-inset-bottom));
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .overflow-y-auto {
            overscroll-behavior-x: none;
            overflow-x: hidden;
        }

        .overflow-x-auto {
            overscroll-behavior-x: none;
        }

        * {
            overscroll-behavior-x: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 16px;
            width: 100%;
            outline: none;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-glass::-moz-placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
        }

        @keyframes floating {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-4px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-floating {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4);
            }

            50% {
                transform: scale(1.08);
                box-shadow: 0 0 8px 4px rgba(139, 92, 246, 0.2);
            }
        }

        .pulse-active {
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        .animate-fade-out {
            animation: fadeOut 0.35s ease forwards;
        }

        /* Smooth Scrolling Marquee Ticker Animation */

        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }

        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            width: 100%;
            display: flex;
            align-items: center;
        }

        /* Glow sweep shimmer animation for still promo banner text */

        @keyframes glowSweep {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        .animate-glow-sweep-gold {
            background: linear-gradient(90deg, #fbbf24 0%, #ffffff 30%, #fcd34d 60%, #fbbf24 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowSweep 3s linear infinite;
        }

        .animate-glow-sweep-emerald {
            background: linear-gradient(90deg, #10b981 0%, #ffffff 30%, #34d399 60%, #10b981 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowSweep 3s linear infinite;
        }

        .animate-glow-sweep-crimson {
            background: linear-gradient(90deg, #ef4444 0%, #ffffff 30%, #f87171 60%, #ef4444 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowSweep 3s linear infinite;
        }

        .animate-glow-sweep-royal {
            background: linear-gradient(90deg, #8b5cf6 0%, #ffffff 30%, #a78bfa 60%, #8b5cf6 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowSweep 3s linear infinite;
        }
    </style>
